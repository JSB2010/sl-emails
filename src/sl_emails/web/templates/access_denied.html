<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Denied</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #edf2f8;
      color: #132a45;
      font-family: Arial, sans-serif;
    }
    main {
      width: min(560px, calc(100vw - 32px));
      background: #fff;
      border-radius: 20px;
      border: 1px solid rgba(8, 32, 65, 0.12);
      padding: 28px;
      box-shadow: 0 14px 36px rgba(8, 32, 65, 0.08);
    }
    h1 {
      margin: 0 0 12px;
      font-size: 34px;
      color: #7f1d1d;
    }
    p {
      line-height: 1.6;
      color: #41556f;
    }
    a {
      color: #0d3566;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Access Denied</h1>
    <p>Your Google account signed in successfully, but it is not currently on the sports email admin allowlist.</p>
    <p>If you should have access, contact an existing sports email admin to add your email address in the app settings.</p>
    <p><a href="/logout">Sign out and try another account</a></p>
  </main>
</body>
</html>
