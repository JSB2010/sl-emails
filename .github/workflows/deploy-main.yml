name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production-main
  cancel-in-progress: false

# Required GitHub secret:
# - FIREBASE_SERVICE_ACCOUNT_JSON: deploy-capable Google service-account key.
#   It must be able to run Cloud Build, deploy Cloud Run, act as the runtime
#   service account, and deploy Firebase Hosting.
# - EMAILS_AUTOMATION_KEY: shared secret for Apps Script scheduled-ingest calls.
# - EMAILS_SESSION_SECRET: Flask session signing secret for Google-authenticated admin sessions.
# - GOOGLE_OAUTH_CLIENT_ID: Google OAuth client ID for the sports email admin UI.
# - GOOGLE_OAUTH_CLIENT_SECRET: Google OAuth client secret for the sports email admin UI.
# - GEMINI_API_KEY_SECRET_NAME: Secret Manager secret name for the Gemini API key
#   (default: gemini-api-key).
# Optional repository variables (defaults match current production):
# - GCP_PROJECT_ID (default: student-leadership-media)
# - GCP_REGION (default: us-central1)
# - CLOUD_RUN_SERVICE (default: sl-emails)
# - CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT
#   (default: sl-emails-runtime@student-leadership-media.iam.gserviceaccount.com)
# - ARTIFACT_REGISTRY_REPOSITORY (default: sl-emails)
# - FIRESTORE_COLLECTION (default: emailWeeks)
# - FIREBASE_HOSTING_URL (default smoke target: https://<project-id>.web.app)
# - GOOGLE_OAUTH_CALLBACK_URL (default: https://<project-id>.web.app/auth/google/callback)
# - PUBLIC_BASE_URL (default: FIREBASE_HOSTING_URL or https://<project-id>.web.app)
# - GEMINI_MODEL (default: gemini-3-flash-preview)
# - EMAILS_BOOTSTRAP_ALLOWED_EMAILS
#   (default: appdev@kentdenver.org,studentleader@kentdenver.org)
# - EMAILS_BOOTSTRAP_NOTIFICATION_EMAILS
#   (default: appdev@kentdenver.org,studentleader@kentdenver.org)

env:
  PYTHON_VERSION: "3.11"
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || 'student-leadership-media' }}
  GCP_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE || 'sl-emails' }}
  CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT: ${{ vars.CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT || 'sl-emails-runtime@student-leadership-media.iam.gserviceaccount.com' }}
  ARTIFACT_REGISTRY_REPOSITORY: ${{ vars.ARTIFACT_REGISTRY_REPOSITORY || 'sl-emails' }}
  FIRESTORE_COLLECTION: ${{ vars.FIRESTORE_COLLECTION || 'emailWeeks' }}
  FIREBASE_HOSTING_URL: ${{ vars.FIREBASE_HOSTING_URL || '' }}
  PUBLIC_BASE_URL: ${{ vars.PUBLIC_BASE_URL || '' }}
  GEMINI_MODEL: ${{ vars.GEMINI_MODEL || 'gemini-3-flash-preview' }}
  GEMINI_API_KEY_SECRET_NAME: ${{ vars.GEMINI_API_KEY_SECRET_NAME || 'gemini-api-key' }}
  EMAILS_AUTOMATION_KEY: ${{ secrets.EMAILS_AUTOMATION_KEY }}
  EMAILS_SESSION_SECRET: ${{ secrets.EMAILS_SESSION_SECRET || '' }}
  GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID || '' }}
  GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET || '' }}
  GOOGLE_OAUTH_CALLBACK_URL: ${{ vars.GOOGLE_OAUTH_CALLBACK_URL || '' }}
  EMAILS_BOOTSTRAP_ALLOWED_EMAILS: ${{ vars.EMAILS_BOOTSTRAP_ALLOWED_EMAILS || 'appdev@kentdenver.org,studentleader@kentdenver.org' }}
  EMAILS_BOOTSTRAP_NOTIFICATION_EMAILS: ${{ vars.EMAILS_BOOTSTRAP_NOTIFICATION_EMAILS || 'appdev@kentdenver.org,studentleader@kentdenver.org' }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-deploy-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-deploy-
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Python test suite
        run: PYTHONPATH=src pytest --cov=src/sl_emails --cov-report=term-missing -q

      - name: Run Google Apps Script tests
        run: node --test google-apps-script/tests/*.js

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Compute deploy metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="$(date -u +%Y%m%d-%H%M%S)-${GITHUB_SHA::7}"
          IMAGE="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REGISTRY_REPOSITORY}/${CLOUD_RUN_SERVICE}:${TAG}"

          if [ -n "${FIREBASE_HOSTING_URL}" ]; then
            HOSTING_URL="${FIREBASE_HOSTING_URL%/}"
          else
            HOSTING_URL="https://${GCP_PROJECT_ID}.web.app"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "hosting_url=${HOSTING_URL}" >> "$GITHUB_OUTPUT"

      - name: Validate required deploy secrets
        shell: bash
        env:
          HOSTING_URL: ${{ steps.meta.outputs.hosting_url }}
        run: |
          set -euo pipefail
          DERIVED_CALLBACK_URL="${GOOGLE_OAUTH_CALLBACK_URL:-${HOSTING_URL%/}/auth/google/callback}"
          DERIVED_PUBLIC_BASE_URL="${PUBLIC_BASE_URL:-${HOSTING_URL%/}}"

          require_value() {
            local key="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "${key} is required for deployment." >&2
              exit 1
            fi
          }

          require_value "EMAILS_AUTOMATION_KEY" "${EMAILS_AUTOMATION_KEY}"
          require_value "EMAILS_SESSION_SECRET" "${EMAILS_SESSION_SECRET}"
          require_value "GOOGLE_OAUTH_CLIENT_ID" "${GOOGLE_OAUTH_CLIENT_ID}"
          require_value "GOOGLE_OAUTH_CLIENT_SECRET" "${GOOGLE_OAUTH_CLIENT_SECRET}"
          require_value "GOOGLE_OAUTH_CALLBACK_URL" "${DERIVED_CALLBACK_URL}"
          require_value "PUBLIC_BASE_URL" "${DERIVED_PUBLIC_BASE_URL}"
          require_value "GEMINI_MODEL" "${GEMINI_MODEL}"
          require_value "GEMINI_API_KEY_SECRET_NAME" "${GEMINI_API_KEY_SECRET_NAME}"

      - name: Build and publish image
        run: >
          gcloud builds submit
          --tag "${{ steps.meta.outputs.image }}"
          --project "${GCP_PROJECT_ID}"
          --ignore-file=.dockerignore
          .

      - name: Deploy Cloud Run
        id: cloud-run
        shell: bash
        env:
          HOSTING_URL: ${{ steps.meta.outputs.hosting_url }}
        run: |
          set -euo pipefail
          export DERIVED_CALLBACK_URL="${GOOGLE_OAUTH_CALLBACK_URL:-${HOSTING_URL%/}/auth/google/callback}"
          export DERIVED_PUBLIC_BASE_URL="${PUBLIC_BASE_URL:-${HOSTING_URL%/}}"
          ENV_FILE="$(mktemp)"
          python - <<'PY' > "${ENV_FILE}"
          import os
          values = {
              "FIREBASE_PROJECT_ID": os.environ["GCP_PROJECT_ID"],
              "FIRESTORE_COLLECTION": os.environ["FIRESTORE_COLLECTION"],
              "EMAILS_AUTOMATION_KEY": os.environ["EMAILS_AUTOMATION_KEY"],
              "EMAILS_SESSION_SECRET": os.environ["EMAILS_SESSION_SECRET"],
              "GOOGLE_OAUTH_CLIENT_ID": os.environ["GOOGLE_OAUTH_CLIENT_ID"],
              "GOOGLE_OAUTH_CLIENT_SECRET": os.environ["GOOGLE_OAUTH_CLIENT_SECRET"],
              "GOOGLE_OAUTH_CALLBACK_URL": os.environ["DERIVED_CALLBACK_URL"],
              "GEMINI_MODEL": os.environ["GEMINI_MODEL"],
              "PUBLIC_BASE_URL": os.environ["DERIVED_PUBLIC_BASE_URL"],
              "EMAILS_BOOTSTRAP_ALLOWED_EMAILS": os.environ["EMAILS_BOOTSTRAP_ALLOWED_EMAILS"],
              "EMAILS_BOOTSTRAP_NOTIFICATION_EMAILS": os.environ["EMAILS_BOOTSTRAP_NOTIFICATION_EMAILS"],
          }
          for key, value in values.items():
              escaped = value.replace("\\", "\\\\").replace('"', '\\"')
              print(f'{key}: "{escaped}"')
          PY

          CLOUD_RUN_URL="$(
            gcloud run deploy "${CLOUD_RUN_SERVICE}" \
              --image "${{ steps.meta.outputs.image }}" \
              --project "${GCP_PROJECT_ID}" \
              --region "${GCP_REGION}" \
              --service-account "${CLOUD_RUN_RUNTIME_SERVICE_ACCOUNT}" \
              --allow-unauthenticated \
              --env-vars-file "${ENV_FILE}" \
              --update-secrets "GEMINI_API_KEY=${GEMINI_API_KEY_SECRET_NAME}:latest" \
              --format='value(status.url)' \
              --quiet
          )"

          rm -f "${ENV_FILE}"
          echo "url=${CLOUD_RUN_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy Firebase Hosting
        run: firebase deploy --only hosting --project "${GCP_PROJECT_ID}" --non-interactive

      - name: Refresh signage snapshot
        shell: bash
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
        run: |
          set -euo pipefail

          DAY_ID="$(python -c 'from datetime import datetime; from zoneinfo import ZoneInfo; print(datetime.now(ZoneInfo("America/Denver")).date().isoformat())')"

          curl \
            --silent \
            --show-error \
            --fail \
            --location \
            --request POST \
            --header "X-Automation-Key: ${EMAILS_AUTOMATION_KEY}" \
            --header "X-Email-Actor: github-actions-deploy" \
            "${CLOUD_RUN_URL%/}/api/signage/automation/days/${DAY_ID}/refresh" \
            > /tmp/signage-refresh.json

          cat /tmp/signage-refresh.json

      - name: Smoke-check deployed URLs
        shell: bash
        env:
          CLOUD_RUN_URL: ${{ steps.cloud-run.outputs.url }}
          HOSTING_URL: ${{ steps.meta.outputs.hosting_url }}
        run: |
          set -euo pipefail

          check_path() {
            local base_url="$1"
            local path="$2"
            local label="$3"
            local expected_fragment="${4:-}"
            local url="${base_url%/}${path}"

            for attempt in 1 2 3 4 5; do
              if body="$(curl --silent --show-error --fail --location "$url")"; then
                if [ -n "$expected_fragment" ] && ! grep -Fq "$expected_fragment" <<<"$body"; then
                  echo "Expected '${expected_fragment}' in ${label} ${path}, got different body" >&2
                else
                  echo "✅ ${label} ${path}"
                  return 0
                fi
              fi

              echo "Retry ${attempt}/5 for ${label} ${path}..."
              sleep 5
            done

            echo "Smoke check failed for ${label} ${path} (${url})" >&2
            return 1
          }

          smoke_target() {
            local base_url="$1"
            local label="$2"

            check_path "$base_url" "/_health" "$label" '"ok"'
            check_path "$base_url" "/signage" "$label"
            check_path "$base_url" "/login" "$label"
          }

          smoke_target "$CLOUD_RUN_URL" "Cloud Run"
          smoke_target "$HOSTING_URL" "Firebase Hosting"

          {
            echo "## Main deploy complete"
            echo ""
            echo "- Cloud Run URL: ${CLOUD_RUN_URL}"
            echo "- Firebase Hosting URL: ${HOSTING_URL}"
            echo "- Image: ${{ steps.meta.outputs.image }}"
          } >> "$GITHUB_STEP_SUMMARY"
