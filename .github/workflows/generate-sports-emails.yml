name: Generate Sports Emails

on:
  schedule:
    # Every Sunday at 3:00 PM Mountain Time (10:00 PM UTC)
    # Adjust this if you're in a different timezone
    - cron: '0 22 * * 0'
  workflow_dispatch: # Allows manual triggering for testing

# Grant only the permissions needed for checkout and Firestore auth
permissions:
  contents: read

jobs:
  generate-emails:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('sports-emails/requirements.txt') }}-week-${{ github.run_number }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ hashFiles('sports-emails/requirements.txt') }}-week-
            ${{ runner.os }}-pip-

      - name: Install Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Install dependencies
        run: |
          pip install -r sports-emails/requirements.txt

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          service_account: ${{ vars.FIREBASE_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          create_credentials_file: false
          export_environment_variables: false
          
      - name: Get week date for summary
        id: get_date
        run: |
          # Calculate upcoming Monday (same logic as Google Apps Script)
          # Get the next occurring Monday
          UPCOMING_MONDAY=$(date -d "next monday" '+%B %d, %Y' 2>/dev/null || date -v+mon '+%B %d, %Y')
          echo "week_date=$UPCOMING_MONDAY" >> $GITHUB_OUTPUT
          echo "Week date: $UPCOMING_MONDAY"

      - name: Publish weekly Firestore draft
        id: generate
        env:
          FIRESTORE_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
          FIRESTORE_PROJECT_ID: ${{ steps.auth.outputs.project_id }}
          FIRESTORE_DATABASE_ID: ${{ vars.FIRESTORE_DATABASE_ID }}
          FIRESTORE_COLLECTION: ${{ vars.FIRESTORE_COLLECTION }}
        run: |
          OUTPUT=$(PYTHONPATH=src python -m sl_emails.ingest.generate_games --firestore-draft --skip-html 2>&1)
          echo "$OUTPUT"

          # Extract key information from output
          SPORTS_GAMES=$(echo "$OUTPUT" | grep -oP '(?<=Found )\d+(?= sports games)' || echo "0")
          ARTS_EVENTS=$(echo "$OUTPUT" | grep -oP '(?<=Found )\d+(?= arts events)' || echo "0")
          MS_EVENTS=$(echo "$OUTPUT" | grep -oP '(?<=Middle School: )\d+(?= events)' || echo "0")
          US_EVENTS=$(echo "$OUTPUT" | grep -oP '(?<=Upper School: )\d+(?= events)' || echo "0")
          DRAFT_WEEK_KEY=$(echo "$OUTPUT" | grep '^DRAFT_WEEK_KEY=' | tail -1 | cut -d= -f2- || echo "unknown")
          DRAFT_DOCUMENT_PATH=$(echo "$OUTPUT" | grep '^DRAFT_DOCUMENT_PATH=' | tail -1 | cut -d= -f2- || echo "unknown")
          DRAFT_REVIEW_STATUS=$(echo "$OUTPUT" | grep '^DRAFT_REVIEW_STATUS=' | tail -1 | cut -d= -f2- || echo "pending")

          # Save to output
          echo "sports_games=$SPORTS_GAMES" >> $GITHUB_OUTPUT
          echo "arts_events=$ARTS_EVENTS" >> $GITHUB_OUTPUT
          echo "ms_events=$MS_EVENTS" >> $GITHUB_OUTPUT
          echo "us_events=$US_EVENTS" >> $GITHUB_OUTPUT
          echo "draft_week_key=$DRAFT_WEEK_KEY" >> $GITHUB_OUTPUT
          echo "draft_document_path=$DRAFT_DOCUMENT_PATH" >> $GITHUB_OUTPUT
          echo "draft_review_status=$DRAFT_REVIEW_STATUS" >> $GITHUB_OUTPUT

      - name: Create summary
        run: |
          echo "## Sports Draft Ingest Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Week:** ${{ steps.get_date.outputs.week_date }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Events Found" >> $GITHUB_STEP_SUMMARY
          echo "- **Sports Games:** ${{ steps.generate.outputs.sports_games }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Arts Events:** ${{ steps.generate.outputs.arts_events }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Total Events:** $((${{ steps.generate.outputs.sports_games }} + ${{ steps.generate.outputs.arts_events }}))" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Events by School Level" >> $GITHUB_STEP_SUMMARY
          echo "- **Middle School:** ${{ steps.generate.outputs.ms_events }} events" >> $GITHUB_STEP_SUMMARY
          echo "- **Upper School:** ${{ steps.generate.outputs.us_events }} events" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Firestore Draft" >> $GITHUB_STEP_SUMMARY
          echo "- **Draft week key:** \`${{ steps.generate.outputs.draft_week_key }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Document:** \`${{ steps.generate.outputs.draft_document_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Review status:** ${{ steps.generate.outputs.draft_review_status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** Draft is ready for review in Firestore; no committed weekly HTML is required at runtime." >> $GITHUB_STEP_SUMMARY
